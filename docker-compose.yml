services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fuelroute
      POSTGRES_USER: fuelroute
      POSTGRES_PASSWORD: fuelroute
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuelroute"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py import_fuel_prices &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: docker-compose-dev-secret-key
      # Requests arrive as http://localhost:8000 (this compose file publishes
      # no TLS termination), so the Host header is "localhost"/"127.0.0.1" --
      # no reason to fall back to a wildcard here. Override for a real domain
      # when actually deploying instead of running this stack locally.
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: postgres://fuelroute:fuelroute@db:5432/fuelroute
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
